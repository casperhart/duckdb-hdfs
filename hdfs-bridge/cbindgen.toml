# Configuration for generating ../src/include/hdfs_bridge.h from this crate's
# `#[no_mangle]` items (see build.rs). Editing the FFI surface in lib.rs
# regenerates the header on the next cargo build, so the two can't drift.

language = "C"
pragma_once = true
# Wrap declarations in `extern "C"` when included from C++ (the only consumer).
cpp_compat = true
documentation = true

header = """
/* Generated by cbindgen from the hdfs-bridge crate — do not edit by hand.
 * The Rust definitions in hdfs-bridge/src/lib.rs are the source of truth;
 * a cargo build regenerates this file (see hdfs-bridge/build.rs). */"""

# The C names predate header generation; keep them so the C++ side and the
# opaque-handle naming convention (hdfs_*_t) stay unchanged.
[export.rename]
"Status" = "hdfs_status_t"
"FileInfo" = "hdfs_file_info_t"
"DirEntry" = "hdfs_dir_entry_t"
"BridgeClient" = "hdfs_client_t"
"BridgeReader" = "hdfs_reader_t"
"BridgeWriter" = "hdfs_writer_t"
"BridgeListStream" = "hdfs_list_stream_t"
